appId: com.devpilot.app
productName: DevPilot
directories:
  output: release
files:
  - dist/**/*
  - electron/**/*
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
  signAndEditExecutable: false
  signingHashAlgorithms: null
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.developer-tools
linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Development
publish:
  provider: github
  owner: brandocalricia
  repo: devpilot
